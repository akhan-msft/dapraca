server:
  port: 8080
spring:
  application:
    name: loyalty-service
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
dapr:
  pubsub:
    name: pubsub-servicebus
    topic: orders
    subscription: loyalty-service
  statestore:
    name: statestore-cosmosdb
logging:
  level:
    com.dapraca: INFO
