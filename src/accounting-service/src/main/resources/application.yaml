server:
  port: 8080
spring:
  application:
    name: accounting-service
  datasource:
    # JDBC URL uses Managed Identity via DefaultAzureCredential
    # Set at runtime via env vars SQL_SERVER + SQL_DATABASE
    url: "jdbc:sqlserver://${SQL_SERVER};databaseName=${SQL_DATABASE};authentication=ActiveDirectoryManagedIdentity;encrypt=true;trustServerCertificate=false;"
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
dapr:
  pubsub:
    name: pubsub-servicebus
    topic: orders
    subscription: accounting-service
logging:
  level:
    com.dapraca: INFO
