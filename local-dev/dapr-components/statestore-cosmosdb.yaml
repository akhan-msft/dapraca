# Local state store — Redis also used for Cosmos DB substitute (loyalty-service)
# In production this is replaced by Cosmos DB via Dapr ACA component
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore-cosmosdb
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "redis:6379"
    - name: redisPassword
      value: ""
    - name: keyPrefix
      value: "loyalty"
